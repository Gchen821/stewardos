services:
  postgres:
    image: postgres:16-alpine
    container_name: stewardos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stewardos}
      POSTGRES_USER: ${POSTGRES_USER:-steward}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-steward_local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    container_name: stewardos-api
    restart: unless-stopped
    user: "1000:1000"
    working_dir: /app
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-StewardOS Agent Runtime}
      APP_ENV: ${APP_ENV:-development}
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-8000}
      API_RELOAD: "false"
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      DATABASE_URL: postgresql+psycopg://steward:steward_local@postgres:5432/stewardos
      REPOSITORY_ROOT_PATH: ${REPOSITORY_ROOT_PATH:-./repositories}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-123456}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
      - ./.env:/app/.env
    depends_on:
      - postgres
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: node:20-alpine
    container_name: stewardos-web
    restart: unless-stopped
    working_dir: /workspace/apps/web
    command: >
      sh -lc "export CI=true &&
      corepack enable &&
      pnpm install &&
      pnpm dev --hostname 0.0.0.0 --port ${WEB_PORT:-3000}"
    environment:
      CI: "true"
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-StewardOS}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./:/workspace
      - web_node_modules:/workspace/apps/web/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
  web_node_modules:
