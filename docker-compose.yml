
services:
  postgres:
    image: postgres:16-alpine
    container_name: stewardos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stewardos}
      POSTGRES_USER: ${POSTGRES_USER:-steward}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-steward_local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: stewardos-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: stewardos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: ./apps/api
    container_name: stewardos-api
    restart: unless-stopped
    working_dir: /app
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "${API_PORT:-8000}"
      - --reload
    environment:
      PROJECT_NAME: ${PROJECT_NAME:-StewardOS}
      APP_ENV: ${APP_ENV:-development}
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-8000}
      API_RELOAD: ${API_RELOAD:-true}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-steward}:${POSTGRES_PASSWORD:-steward_local}@postgres:5432/${POSTGRES_DB:-stewardos}"
      REDIS_URL: redis://redis:6379/${REDIS_DB:-0}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-stewardos-dev}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
      - minio
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: node:20-alpine
    container_name: stewardos-web
    restart: unless-stopped
    working_dir: /workspace/apps/web
    command: >
      sh -lc "export CI=true &&
      corepack enable &&
      pnpm install &&
      pnpm dev --hostname 0.0.0.0 --port ${WEB_PORT:-3000}"
    environment:
      CI: "true"
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-StewardOS}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./:/workspace
      - web_node_modules:/workspace/apps/web/node_modules
    depends_on:
      - postgres
      - redis
      - minio
      - api

volumes:
  postgres_data:
  redis_data:
  minio_data:
  web_node_modules:
